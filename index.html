<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padej_ - Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .navigation-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background-image: url('https://github.com/Pa-dej.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            margin: 0 0 30px 0;
            font-size: 1.1em;
        }
        
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
        }
        
        .nav-button {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1.1em;
            font-weight: 500;
        }
        
        .nav-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .nav-button.primary {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        .nav-button.primary:hover {
            background: white;
        }
    </style>
</head>
<body>
    <div class="navigation-container">
        <div class="logo"></div>
        <h1>Padej_</h1>
        <p class="subtitle">Portfolio & Projects</p>
        
        <div class="nav-buttons">
            <a href="bio/" class="nav-button primary">Bio & Portfolio</a>
            <a href="#" class="nav-button" onclick="alert('Coming soon!')">Projects</a>
            <a href="#" class="nav-button" onclick="alert('Coming soon!')">Blog</a>
            <a href="https://github.com/Pa-dej" class="nav-button" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
