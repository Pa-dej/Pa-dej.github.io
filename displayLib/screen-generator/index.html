<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DisplayLib UI Constructor</title>
<link rel="stylesheet" href="../../style.css">
<link rel="stylesheet" href="../../icons-minecraft-244.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="displaylib-body">
<div class="app-container">
  <div class="topbar">
    <div class="logo">Display<span>Lib</span></div>
    <div class="tsep"></div>
    <button class="btn" id="btnClear">× Очистить</button>
    <div class="tsep"></div>
    <label class="tl"><input type="checkbox" id="gridToggle" checked style="accent-color:var(--accent)"> Сетка</label>
    <label class="tl">Шаг: 
      <select id="gridStepSelect" class="tinput" style="cursor:pointer;width:60px">
        <option value="0.125">1/8</option>
        <option value="0.25" selected>1/4</option>
        <option value="0.5">1/2</option>
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label class="tl">Zoom: <span id="zoomDisplay" style="color:var(--accent);font-weight:bold;" title="Используйте колесико мыши для изменения масштаба">×120</span></label>
    <div class="tright">
      <input id="screenId" class="tinput" style="width:120px" placeholder="screen id" value="my_screen">
    </div>
  </div>
  <div class="workspace">
    <div class="pleft">
      <div class="ptitle">Виджеты</div>
      <div class="wlist">
        <div class="witem" draggable="true" data-type="ITEM_BUTTON" data-material="RED_STAINED_GLASS_PANE">
          <div class="wicon" id="item-button-icon"></div>
          <div class="winfo"><div class="wname">Item Button</div><div class="wdesc">anchor: центр</div></div>
          <div class="tbadge ti">ITEM</div>
        </div>
        <div class="witem" draggable="true" data-type="TEXT_BUTTON" data-material="">
          <div class="wicon" style="display:flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--accent);color:#000;border-radius:3px;font-weight:bold;font-size:12px;">T</div>
          <div class="winfo"><div class="wname">Text Button</div><div class="wdesc">anchor: центр-X низ-Y</div></div>
          <div class="tbadge tt">TEXT</div>
        </div>
      </div>
      
      <div class="ptitle" style="margin-top:auto">Виджеты на экране</div>
      <button class="btn" id="btnAddBg" style="margin:6px;width:calc(100% - 12px);font-size:11px;">+ Добавить фон</button>
      <div id="widgetList" style="padding:5px 6px;overflow-y:auto;max-height:200px;display:flex;flex-direction:column;gap:2px;"></div>
    </div>
    <div class="cwrap" id="cwrap">
      <canvas id="cv"></canvas>
      <div id="widget-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;"></div>
      <div id="hovtip" class="hovtip" style="position:absolute;background:rgba(0,0,0,0.8);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;font-family:monospace;pointer-events:none;z-index:10;visibility:hidden;white-space:nowrap;"></div>
      <div id="estate" class="estate"><h3>Холст пуст</h3><p>Перетащите виджет или добавьте фон</p></div>
      <div class="cov">
        Курсор: X <span id="curX">0.00</span> Y <span id="curY">0.00</span>
        &nbsp;|&nbsp; <span id="screenInfo">—</span>
      </div>
    </div>
    <div class="pright">
      <div class="ptitle">Свойства</div>
      <div class="pscroll" id="propPanel"><div class="nsm">Выберите элемент<br>для редактирования</div></div>
    </div>
  </div>

</div>

<div class="yaml-container">
  <div class="yhead">
    <div class="ytitle">YAML Editor</div>
    <button class="btn primary" id="btnCopy2" style="font-size:10px;padding:4px 10px">Копировать</button>
  </div>
  <div class="ybody"></div>
</div>

<div class="cmenu" id="ctxMenu">
  <div class="citem" id="ctxDup">Дублировать</div>
  <div class="csep"></div>
  <div class="citem danger" id="ctxDel">× Удалить</div>
</div>
<div class="dghost" id="dghost" style="display:none;width:52px;height:52px;"></div>

<!-- Core modules -->
<script src="materials.js"></script>
<script src="core.js"></script>
<script src="geometry.js"></script>
<script src="material-search.js"></script>
<script src="material-ui.js"></script>

<!-- Canvas and rendering -->
<script src="canvas.js"></script>
<script src="overlays.js"></script>

<!-- UI components -->
<script src="widgets.js"></script>
<script src="properties.js"></script>
<script src="events.js"></script>
<script src="yaml-export.js"></script>
<script src="yaml-parser.js"></script>
<script src="yaml-editor.js"></script>
<script src="context-menu.js"></script>
<script src="demo.js"></script>

<!-- Initialization -->
<script src="init.js"></script>

<!-- Test script for Minecraft rendering calibration -->
<script>
// Запускаем тесты после полной инициализации
window.addEventListener('load', () => {
  setTimeout(() => {
    if (window.ScreenGenerator && window.ScreenGenerator.mcBgSize) {
      console.log('🧪 Запуск тестов калибровки Minecraft рендеринга...');
      
      // Тест 1: Пустой фон text=" ", scale=[8, 4, 1]
      console.log('=== ТЕСТ 1: Пустой фон ===');
      const test1 = window.ScreenGenerator.mcBgSize(' ', 8, 4);
      console.log('text=" ", scale=[8, 4, 1]');
      console.log('mcTextWidth(" ") =', window.ScreenGenerator.mcTextWidth(' '));
      console.log('Ожидаемый результат: 1.2 × 1.1 блока');
      console.log('Фактический результат:', test1.w.toFixed(3), '×', test1.h.toFixed(3), 'блока');
      console.log('Соответствие:', Math.abs(test1.w - 1.2) < 0.01 && Math.abs(test1.h - 1.1) < 0.01 ? '✅' : '❌');

      // Тест 2: text="Button", scale=[4, 2, 1]
      console.log('\n=== ТЕСТ 2: Текст "Button" ===');
      const test2 = window.ScreenGenerator.mcBgSize('Button', 4, 2);
      console.log('text="Button", scale=[4, 2, 1]');
      console.log('mcTextWidth("Button") =', window.ScreenGenerator.mcTextWidth('Button'));
      console.log('Ожидаемый результат: 3.9 × 0.55 блока');
      console.log('Фактический результат:', test2.w.toFixed(3), '×', test2.h.toFixed(3), 'блока');
      console.log('Соответствие:', Math.abs(test2.w - 3.9) < 0.1 && Math.abs(test2.h - 0.55) < 0.01 ? '✅' : '❌');

      console.log('\n🧪 Тесты завершены. Проверьте результаты выше.');
    }
  }, 1000);
});
</script>

</body>
</html>
